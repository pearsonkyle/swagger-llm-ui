<!DOCTYPE html>
<html>
  <head>
    <title>{{ title }}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="{{ swagger_css_url }}" />
    <link rel="stylesheet" type="text/css" href="{{ theme_css_url }}" />
    <!-- FOUC fix: Apply default theme immediately before page renders -->
    <script>
      (function() {
        try {
          var colorRe = /^#[0-9a-fA-F]{3,8}$|^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*(,\s*(0|1|0?\.\d+))?\s*\)$/;
          function safeColor(val, fallback) { return colorRe.test(val) ? val : fallback; }
          var themeData = JSON.parse(localStorage.getItem('docbuddy-theme') || '{"theme":"light","customColors":{}}');
          var colors = {
            dark: { primary: '#1d4ed8', background: '#0f172a', textPrimary: '#f7fafc', secondary: '#2d3748', panelBg: '#1f2937', headerBg: '#111827', borderColor: '#4a5568', textSecondary: '#cbd5e0', inputBg: '#1f2937', accent: '#718096', primaryHover: '#1e40af' },
            light: { primary: '#2563eb', background: '#f7fafc', textPrimary: '#1a202c', secondary: '#e2e8f0', panelBg: '#ffffff', headerBg: '#edf2f7', borderColor: '#cbd5e0', textSecondary: '#4a5568', inputBg: '#f7fafc', accent: '#718096', primaryHover: '#1d4ed8' }
          };
          var theme = colors[themeData.theme] || colors.dark;
          var merged = Object.assign({}, theme, themeData.customColors || {});
          var css = ':root { --theme-primary: ' + safeColor(merged.primary, theme.primary) + '; --theme-primary-hover: ' + safeColor(merged.primaryHover || merged.primary, theme.primaryHover || theme.primary) + '; --theme-background: ' + safeColor(merged.background, theme.background) + '; --theme-text-primary: ' + safeColor(merged.textPrimary, theme.textPrimary) + '; --theme-secondary: ' + safeColor(merged.secondary, theme.secondary) + '; --theme-panel-bg: ' + safeColor(merged.panelBg || merged.secondary, theme.panelBg || theme.secondary) + '; --theme-header-bg: ' + safeColor(merged.headerBg || merged.background, theme.headerBg || theme.background) + '; --theme-border-color: ' + safeColor(merged.borderColor || merged.secondary, theme.borderColor || theme.secondary) + '; --theme-text-secondary: ' + safeColor(merged.textSecondary || '#6b7280', theme.textSecondary || '#6b7280') + '; --theme-input-bg: ' + safeColor(merged.inputBg || merged.secondary, theme.inputBg || theme.secondary) + '; --theme-accent: ' + safeColor(merged.accent, theme.accent) + '; }';
          var style = document.createElement('style');
          style.id = 'docbuddy-theme-styles';
          style.textContent = css;
          document.head.appendChild(style);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="swagger-ui"></div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js" integrity="sha384-odPBjvtXVM/5hOYIr3A1dB+flh0c3wAT3bSesIOqEGmyUA4JoKf/YTWy0XKOYAY7" crossorigin="anonymous"></script>
    <script src="{{ swagger_js_url }}"></script>
    <script src="/docbuddy-static/docbuddy-core.js"></script>
    <script src="/docbuddy-static/docbuddy-chat.js"></script>
    <script src="/docbuddy-static/docbuddy-settings.js"></script>
    <script src="/docbuddy-static/docbuddy-workflow.js"></script>
    <script src="/docbuddy-static/docbuddy-plugin.js"></script>
    <script src="{{ llm_layout_js_url }}"></script>

    <style>
      /* LLM Panel CSS - scoped to avoid conflicts */
      #llm-settings-panel {
        font-family: 'Inter', 'Segoe UI', sans-serif;
      }
      .llm-provider-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        margin-right: 8px;
        color: #fff;
      }
      .llm-provider-ollama { background-color: #2b90d8; }
      .llm-provider-lmstudio { background-color: #6366f1; }
      .llm-provider-vllm { background-color: #facc15; color: #1a1a1a; }
    </style>

    <script>
      // Read LLM settings from localStorage (set by the LLMSettingsPanel)
      var STORAGE_KEY = "docbuddy-settings";

      function getLLMSettings() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }

      window.onload = function () {
        var ui = SwaggerUIBundle({
          url: "{{ openapi_url }}",
          dom_id: "#swagger-ui",
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
          plugins: [
            SwaggerUIBundle.plugins.DownloadUrl,
            LLMSettingsPlugin,
            LLMLayoutPlugin,
          ],
          layout: "LLMDocsLayout",
        });
        window.ui = ui;
      };
    </script>
  </body>
</html>
