name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Bump type for version increment (major/minor/patch)'
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch
      version:
        description: 'Version to release (e.g., 0.5.0) - leave empty if using bump-type'
        required: false
      publish-to-testpypi:
        description: 'Publish to TestPyPI first'
        type: boolean
        default: false
      dry-run:
        description: 'Test build without uploading'
        type: boolean
        default: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            # Use explicit version if provided
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Calculate new version based on bump-type
            CURRENT_VERSION=$(grep '^version = "' pyproject.toml | cut -d'"' -f2)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            case "${{ github.event.inputs.bump-type }}" in
              major)
                NEW_MAJOR=$((MAJOR + 1))
                echo "version=${NEW_MAJOR}.0.0" >> $GITHUB_OUTPUT
                ;;
              minor)
                NEW_MINOR=$((MINOR + 1))
                echo "version=${MAJOR}.${NEW_MINOR}.0" >> $GITHUB_OUTPUT
                ;;
              patch)
                NEW_PATCH=$((PATCH + 1))
                echo "version=${MAJOR}.${MINOR}.${NEW_PATCH}" >> $GITHUB_OUTPUT
                ;;
            esac
          fi

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in semantic versioning format (e.g., 0.5.0)"
            exit 1
          fi

      - name: Check version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PYPROJECT_VERSION=$(grep '^version = "' pyproject.toml | cut -d'"' -f2)
          if [ "${{ github.event_name }}" == "push" ]; then
            # For tag pushes, version should match the tag (no check needed here)
            echo "Tag release: v${VERSION}"
          elif [ "$VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Note: Using bump-type to increment version from $PYPROJECT_VERSION to $VERSION"
          else
            echo "Version matches pyproject.toml: $VERSION"
          fi

      - name: Update version in pyproject.toml (if using bump-type)
        if: github.event.inputs.version == '' && github.event_name != 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml to version $VERSION"
          cat pyproject.toml | head -5

  test-publish:
    runs-on: ubuntu-latest
    needs: validate-version
    if: github.event.inputs.publish-to-testpypi == 'true' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine build

      - name: Build package
        run: hatch build

      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

  publish:
    runs-on: ubuntu-latest
    needs: [validate-version, test-publish]
    if: github.event.inputs.dry-run != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine build

      - name: Build package
        run: hatch build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          print-hash: true

  create-release:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"

          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            # Generate release notes from commits between tags
            cat <<EOF > release_notes.md
            ## Changelog

            ### Changes since $PREVIOUS_TAG

            $(git log --oneline "${PREVIOUS_TAG}..HEAD" | sed 's/^/- /')

            EOF
          else
            # First release - use README as base
            cat <<EOF > release_notes.md
            ## DocBuddy v${VERSION}

            ### New Project

            This is the first release of DocBuddy.

            For more information, see the [README](https://github.com/pearsonkyle/docbuddy/blob/main/README.md).

            EOF
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: "Release v${{ needs.validate-version.outputs.version }}"
          body: |
            ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [publish, create-release]
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Notify release completed
        run: |
          echo "Release v${{ needs.validate-version.outputs.version }} completed!"
          echo "PyPI: https://pypi.org/project/docbuddy/${{ needs.validate-version.outputs.version }}"
          if [ "${{ github.event.inputs.publish-to-testpypi }}" == "true" ]; then
            echo "TestPyPI: https://test.pypi.org/project/docbuddy/${{ needs.validate-version.outputs.version }}"
          fi
